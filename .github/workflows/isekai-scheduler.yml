name: Isekai Daily Scheduler

on:
  schedule:
    # 每2小时运行一次 (UTC时间)
    # 北京时间: 5:00/7:00/9:00/11:00/13:00/15:00/17:00/19:00/21:00/23:00
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # 允许手动触发
  push:
    # 首次推送时触发一次验证
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run Isekai Scheduler
        run: python run_once.py

      - name: Commit data changes
        run: |
          git config user.name "Isekai Bot"
          git config user.email "isekai@bot.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto: scheduled update [$(date +'%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push origin main
          fi
